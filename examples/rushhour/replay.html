<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rush Hour — Session Replay</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0f;--surface:#13131a;--border:#1e1e2e;--text:#e2e2f0;--muted:#555570;
  --target:#e63946;--obstacle:#3a7bd5;--exit:#2ec4b6;
  --p0:#f4c400;--p1:#44cc44;--p2:#9b59ff;
  --cell:62px;--gap:3px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;min-height:100vh;}

header{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;}
header h1{font-family:'Space Mono',monospace;font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);}
header span{font-size:11px;color:var(--muted);margin-left:auto;}

.layout{display:flex;height:calc(100vh - 49px);}

/* sidebar */
.sidebar{width:210px;flex-shrink:0;border-right:1px solid var(--border);overflow-y:auto;padding:10px 0;}
.sidebar-section{padding:6px 12px 2px;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
.sess-btn{display:block;width:100%;text-align:left;padding:8px 12px;background:none;border:none;color:#888;font-family:'IBM Plex Sans',sans-serif;font-size:12px;cursor:pointer;border-left:2px solid transparent;}
.sess-btn:hover{background:var(--surface);color:var(--text);}
.sess-btn.active{border-left-color:var(--exit);color:var(--text);background:var(--surface);}
.lvl-pills{display:flex;gap:3px;margin-top:5px;}
.lvl-pill{font-family:'Space Mono',monospace;font-size:9px;padding:1px 5px;border-radius:3px;border:1px solid var(--border);}
.lvl-pill.cleared{border-color:var(--exit);color:var(--exit);}
.lvl-pill.failed{border-color:#333;color:var(--muted);}

/* main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}

.controls{display:flex;align-items:center;gap:8px;padding:8px 16px;border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;}
.lvl-tab{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1px;padding:4px 10px;border-radius:4px;border:1px solid var(--border);background:none;color:var(--muted);cursor:pointer;}
.lvl-tab.active{border-color:var(--exit);color:var(--exit);background:rgba(46,196,182,.07);}
.lvl-tab.failed{opacity:.4;}
.round-nav{display:flex;align-items:center;gap:6px;margin-left:auto;}
.nav-btn{width:26px;height:26px;border-radius:4px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;}
.nav-btn:hover{border-color:var(--exit);}
.nav-btn:disabled{opacity:.3;cursor:default;}
.round-label{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);min-width:80px;text-align:center;}
.play-btn{padding:4px 12px;border-radius:4px;border:1px solid var(--exit);background:rgba(46,196,182,.1);color:var(--exit);cursor:pointer;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1px;}
.play-btn:hover{background:rgba(46,196,182,.2);}

.content{flex:1;display:flex;overflow:hidden;}

.board-area{padding:20px 24px;overflow-y:auto;display:flex;flex-direction:column;gap:12px;align-items:flex-start;}

/* grid */
.grid-wrapper{position:relative;}
.rh-grid{display:grid;grid-template-columns:repeat(6,var(--cell));grid-template-rows:repeat(6,var(--cell));gap:var(--gap);background:var(--surface);padding:var(--gap);border:1px solid var(--border);border-radius:6px;position:relative;}
.rh-cell{background:#0d0d14;border-radius:3px;border:1px solid #1a1a26;}
.exit-bar{position:absolute;right:-10px;top:calc(2*(var(--cell) + var(--gap)) + var(--gap));width:8px;height:var(--cell);background:var(--exit);border-radius:0 3px 3px 0;}

/* blocks */
.rh-block{position:absolute;border-radius:5px;border:1.5px solid rgba(255,255,255,.1);transition:left .28s ease,top .28s ease,opacity .3s;font-family:'Space Mono',monospace;font-size:9px;color:rgba(255,255,255,.4);letter-spacing:1px;display:flex;align-items:center;justify-content:center;}
.rh-block.target{background:var(--target);}
.rh-block.obstacle{background:var(--obstacle);}
.rh-block.moved{box-shadow:0 0 0 2px rgba(255,255,255,.4);}

/* directional vote dots — 4 absolute positions per block */
.vdots-left,.vdots-right,.vdots-top,.vdots-bottom{position:absolute;display:flex;gap:3px;z-index:10;}
/* horizontal blocks: left=back, right=fwd */
.vdots-left {left:5px;top:50%;transform:translateY(-50%);flex-direction:column;}
.vdots-right{right:5px;top:50%;transform:translateY(-50%);flex-direction:column;}
/* vertical blocks: top=back, bottom=fwd */
.vdots-top   {top:5px;left:50%;transform:translateX(-50%);flex-direction:row;}
.vdots-bottom{bottom:5px;left:50%;transform:translateX(-50%);flex-direction:row;}
.vdot{width:9px;height:9px;border-radius:50%;}

/* info panel */
.info-panel{width:290px;flex-shrink:0;border-left:1px solid var(--border);overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px;}
.info-title{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:7px;}

/* player rows */
.player-row{padding:7px 9px;background:var(--surface);border-radius:5px;margin-bottom:4px;border-left:2px solid transparent;}
.player-row.has-vote{border-left-color:var(--exit);}
.player-row.no-vote{border-left-color:#2a2a3e;}
.pr-top{display:flex;align-items:center;gap:7px;}
.pdot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.pname{font-size:12px;font-weight:500;}
.pvote{margin-left:auto;font-family:'Space Mono',monospace;font-size:10px;}
.pvote.active{color:var(--exit);}
.pvote.none{color:var(--muted);}
.prt{font-size:10px;color:var(--muted);margin-top:2px;margin-left:16px;}

/* vote sequence timeline */
.vote-seq{margin-top:6px;margin-left:16px;display:flex;flex-direction:column;gap:3px;}
.vseq-item{display:flex;align-items:center;gap:6px;font-size:10px;font-family:'Space Mono',monospace;}
.vseq-item .ts{color:var(--muted);width:44px;flex-shrink:0;}
.vseq-item .val{color:var(--text);}
.vseq-item .val.cleared{color:var(--muted);font-style:italic;}
.vseq-arrow{color:var(--muted);font-size:8px;}
.seq-change-type{font-size:8px;padding:1px 4px;border-radius:3px;margin-left:4px;}
.seq-change-type.block_change{background:rgba(244,196,0,.15);color:var(--p0);}
.seq-change-type.dir_change{background:rgba(68,204,68,.12);color:var(--p1);}
.seq-change-type.cleared{background:rgba(100,100,120,.2);color:var(--muted);}
.seq-change-type.reselect{background:rgba(155,89,255,.15);color:var(--p2);}

/* moves */
.move-list{display:flex;flex-direction:column;gap:4px;}
.move-item{font-family:'Space Mono',monospace;font-size:10px;padding:5px 8px;background:var(--surface);border-radius:4px;display:flex;align-items:center;gap:6px;}
.move-item.tm{border-left:2px solid var(--target);}
.move-item.om{border-left:2px solid var(--obstacle);}
.no-move-badge{font-family:'Space Mono',monospace;font-size:10px;color:#555;padding:5px 8px;background:var(--surface);border-radius:4px;border-left:2px solid #333;}

/* timeline dots */
.round-timeline{display:flex;flex-wrap:wrap;gap:3px;}
.rt-dot{width:11px;height:11px;border-radius:2px;cursor:pointer;border:1px solid transparent;transition:transform .1s;}
.rt-dot:hover{transform:scale(1.3);}
.rt-dot.tm{background:var(--target);}
.rt-dot.om{background:var(--obstacle);}
.rt-dot.nm{background:#1e1e2e;border-color:#2a2a3e;}
.rt-dot.cur{border-color:white!important;border-width:1.5px;}

.stat-row{display:flex;justify-content:space-between;font-size:11px;padding:3px 0;border-bottom:1px solid var(--border);}
.stat-val{font-family:'Space Mono',monospace;color:var(--exit);}

#placeholder{flex:1;display:flex;align-items:center;justify-content:center;color:var(--muted);font-family:'Space Mono',monospace;font-size:11px;letter-spacing:2px;}
</style>
</head>
<body>
<header>
  <h1>Rush Hour · Session Replay</h1>
  <span>5 sessions · 4 levels · arrows or space to navigate</span>
</header>
<div class="layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="main" id="main"><div id="placeholder">← SELECT A SESSION</div></div>
</div>

 "fwd"}]}, "_jahezzdkt": {"name": "CleverFox", "color": 0, "block": "b2", "dir": "fwd", "rt_ms": 2404, "sequence": [{"t": 1777929422373, "rt_ms": 2404, "block": "b2", "dir": "fwd"}]}}, "any_move": false}]}]}], "levels_init": [[{"id": "b0", "type": "target", "dir": "h", "col": 0, "row": 2, "size": 2}, {"id": "b1", "type": "obstacle", "dir": "v", "col": 2, "row": 1, "size": 2}, {"id": "b2", "type": "obstacle", "dir": "v", "col": 3, "row": 2, "size": 2}, {"id": "b3", "type": "obstacle", "dir": "v", "col": 4, "row": 2, "size": 2}, {"id": "b4", "type": "obstacle", "dir": "h", "col": 1, "row": 0, "size": 2}, {"id": "b5", "type": "obstacle", "dir": "h", "col": 4, "row": 4, "size": 2}, {"id": "b6", "type": "obstacle", "dir": "v", "col": 5, "row": 1, "size": 2}], [{"id": "b0", "type": "target", "dir": "h", "col": 0, "row": 2, "size": 2}, {"id": "b1", "type": "obstacle", "dir": "v", "col": 2, "row": 0, "size": 3}, {"id": "b2", "type": "obstacle", "dir": "v", "col": 4, "row": 2, "size": 3}, {"id": "b3", "type": "obstacle", "dir": "h", "col": 1, "row": 3, "size": 2}, {"id": "b4", "type": "obstacle", "dir": "v", "col": 3, "row": 1, "size": 2}, {"id": "b5", "type": "obstacle", "dir": "h", "col": 4, "row": 5, "size": 2}, {"id": "b6", "type": "obstacle", "dir": "v", "col": 5, "row": 0, "size": 3}], [{"id": "b0", "type": "target", "dir": "h", "col": 0, "row": 2, "size": 2}, {"id": "b1", "type": "obstacle", "dir": "v", "col": 2, "row": 0, "size": 3}, {"id": "b2", "type": "obstacle", "dir": "v", "col": 4, "row": 1, "size": 3}, {"id": "b3", "type": "obstacle", "dir": "h", "col": 2, "row": 3, "size": 2}, {"id": "b4", "type": "obstacle", "dir": "h", "col": 4, "row": 4, "size": 2}, {"id": "b5", "type": "obstacle", "dir": "v", "col": 5, "row": 0, "size": 2}, {"id": "b6", "type": "obstacle", "dir": "v", "col": 0, "row": 3, "size": 2}], [{"id": "b0", "type": "target", "dir": "h", "col": 0, "row": 2, "size": 2}, {"id": "b1", "type": "obstacle", "dir": "v", "col": 2, "row": 0, "size": 3}, {"id": "b2", "type": "obstacle", "dir": "v", "col": 4, "row": 2, "size": 3}, {"id": "b3", "type": "obstacle", "dir": "h", "col": 1, "row": 3, "size": 2}, {"id": "b4", "type": "obstacle", "dir": "v", "col": 3, "row": 1, "size": 2}, {"id": "b5", "type": "obstacle", "dir": "h", "col": 3, "row": 5, "size": 2}, {"id": "b6", "type": "obstacle", "dir": "v", "col": 5, "row": 0, "size": 3}, {"id": "b7", "type": "obstacle", "dir": "v", "col": 0, "row": 3, "size": 2}]]};

let curSess=null,curLvl=0,curRound=0,playIv=null;

// ── Sidebar ──────────────────────────────────────────────────────────────────
const sidebar=document.getElementById('sidebar');
sidebar.innerHTML='<div class="sidebar-section">Sessions</div>';
DATA.sessions.forEach((s,si)=>{
  const btn=document.createElement('button');
  btn.className='sess-btn';
  const names=s.players.map(p=>p.name).join(' · ');
  const pills=s.levels.map((l,li)=>l
    ?`<span class="lvl-pill ${l.cleared?'cleared':'failed'}">L${li+1}${l.cleared?' ✓':' ×'}</span>`
    :`<span class="lvl-pill failed">L${li+1} –</span>`
  ).join('');
  btn.innerHTML=`<div style="font-weight:500;font-size:12px;">${s.session_id.slice(1,9)}</div>
    <div style="font-size:10px;color:var(--muted);margin-top:2px;">${names}</div>
    <div class="lvl-pills" style="margin-top:5px;">${pills}</div>`;
  btn.onclick=()=>selectSess(si);
  sidebar.appendChild(btn);
});

function selectSess(si){
  stopPlay();curSess=si;curLvl=0;curRound=0;
  document.querySelectorAll('.sess-btn').forEach((b,i)=>b.classList.toggle('active',i===si));
  renderMain();
}

// ── Main layout ───────────────────────────────────────────────────────────────
function renderMain(){
  const s=DATA.sessions[curSess];
  const main=document.getElementById('main');
  main.innerHTML='';

  // Controls
  const ctrl=document.createElement('div');ctrl.className='controls';
  s.levels.forEach((l,li)=>{
    const tab=document.createElement('button');
    tab.className='lvl-tab'+(li===curLvl?' active':'')+(l?'':' failed');
    tab.textContent=l?`L${li+1} · ${l.total_rounds}r ${l.cleared?'✓':'×'}`:`L${li+1} –`;
    if(l) tab.onclick=()=>{stopPlay();curLvl=li;curRound=0;renderMain();};
    ctrl.appendChild(tab);
  });

  const nav=document.createElement('div');nav.className='round-nav';
  const playBtn=document.createElement('button');playBtn.className='play-btn';playBtn.textContent='▶ PLAY';playBtn.onclick=togglePlay;
  const prevBtn=document.createElement('button');prevBtn.className='nav-btn';prevBtn.textContent='‹';
  prevBtn.onclick=()=>{stopPlay();curRound=Math.max(0,curRound-1);renderRound();};
  const nextBtn=document.createElement('button');nextBtn.className='nav-btn';nextBtn.textContent='›';
  nextBtn.onclick=()=>{stopPlay();advance();};
  const lbl=document.createElement('div');lbl.className='round-label';lbl.id='rlbl';
  nav.append(playBtn,prevBtn,lbl,nextBtn);
  ctrl.appendChild(nav);
  main.appendChild(ctrl);

  // Content
  const content=document.createElement('div');content.className='content';
  const boardArea=document.createElement('div');boardArea.className='board-area';boardArea.id='board-area';
  const infoPanel=document.createElement('div');infoPanel.className='info-panel';infoPanel.id='info-panel';
  content.append(boardArea,infoPanel);
  main.appendChild(content);

  buildGrid();
  renderRound();
}

function buildGrid(){
  const ba=document.getElementById('board-area');
  const wrap=document.createElement('div');wrap.className='grid-wrapper';
  const grid=document.createElement('div');grid.className='rh-grid';grid.id='rh-grid';
  for(let i=0;i<36;i++){const c=document.createElement('div');c.className='rh-cell';grid.appendChild(c);}
  const exit=document.createElement('div');exit.className='exit-bar';
  wrap.append(grid,exit);ba.appendChild(wrap);
}

// ── Board rendering ───────────────────────────────────────────────────────────
function renderRound(){
  const s=DATA.sessions[curSess];
  const level=s.levels[curLvl];
  if(!level)return;
  const round=level.rounds[curRound];
  if(!round)return;

  const lbl=document.getElementById('rlbl');
  if(lbl)lbl.textContent=`Round ${curRound+1} / ${level.total_rounds}`;

  const grid=document.getElementById('rh-grid');
  grid.querySelectorAll('.rh-block').forEach(e=>e.remove());

  const init=DATA.levels_init[curLvl];
  const state=round.state_before;
  const moves=round.moves;
  const votes=round.votes;

  // Build per-block, per-direction vote lists: {blockId: {fwd:[colorIdxs], back:[colorIdxs]}}
  const voteMap={};
  Object.values(votes).forEach(v=>{
    if(!v.block)return;
    if(!voteMap[v.block])voteMap[v.block]={fwd:[],back:[]};
    voteMap[v.block][v.dir].push(v.color);
  });

  init.forEach(b=>{
    const pos=state[b.id];if(!pos)return;
    const el=document.createElement('div');
    el.className='rh-block '+b.type;
    if(moves[b.id])el.classList.add('moved');
    const w=b.dir==='h'?b.size*(CELL+GAP)-GAP:CELL;
    const h=b.dir==='v'?b.size*(CELL+GAP)-GAP:CELL;
    const p=cellPx(pos.col,pos.row);
    el.style.cssText=`left:${p.x}px;top:${p.y}px;width:${w}px;height:${h}px;`;
    el.textContent=b.id.toUpperCase();
    if(pos.col>=6){el.style.opacity='0';}

    // Directional vote dots
    const vm=voteMap[b.id];
    if(vm){
      if(b.dir==='h'){
        // left side = back votes, right side = fwd votes
        if(vm.back.length){
          const d=makeDots(vm.back,'vdots-left');el.appendChild(d);
        }
        if(vm.fwd.length){
          const d=makeDots(vm.fwd,'vdots-right');el.appendChild(d);
        }
      } else {
        // top = back votes, bottom = fwd votes
        if(vm.back.length){
          const d=makeDots(vm.back,'vdots-top');el.appendChild(d);
        }
        if(vm.fwd.length){
          const d=makeDots(vm.fwd,'vdots-bottom');el.appendChild(d);
        }
      }
    }

    grid.appendChild(el);
  });

  renderInfo(round,level);
}

function makeDots(colorIdxs,cls){
  const wrap=document.createElement('div');wrap.className=cls;
  colorIdxs.forEach(c=>{
    const d=document.createElement('div');d.className='vdot';
    d.style.background=PCOLS[c]||'#aaa';
    wrap.appendChild(d);
  });
  return wrap;
}

// ── Info panel ────────────────────────────────────────────────────────────────
function renderInfo(round,level){
  const panel=document.getElementById('info-panel');if(!panel)return;
  panel.innerHTML='';

  // Players & votes with sequence
  const psec=document.createElement('div');
  psec.innerHTML='<div class="info-title">Votes this round</div>';

  Object.values(round.votes).forEach(v=>{
    const row=document.createElement('div');
    const hasVote=!!v.block;
    row.className='player-row '+(hasVote?'has-vote':'no-vote');

    const top=document.createElement('div');top.className='pr-top';
    top.innerHTML=`
      <div class="pdot" style="background:${PCOLS[v.color]||'#aaa'}"></div>
      <div class="pname">${v.name}</div>
      <div class="pvote ${hasVote?'active':'none'}">${hasVote?v.block.toUpperCase()+' '+v.dir:'—'}</div>
    `;
    row.appendChild(top);

    if(v.rt_ms!=null){
      const rt=document.createElement('div');rt.className='prt';
      const pct=Math.round(v.rt_ms/50);// bar width %
      rt.innerHTML=`<span style="color:var(--muted)">${v.rt_ms}ms</span> <span style="color:#333;font-size:9px;">into 5s window</span>`;
      row.appendChild(rt);
    }

    // Vote sequence if >1 event
    if(v.sequence && v.sequence.length>1){
      const seq=document.createElement('div');seq.className='vote-seq';
      v.sequence.forEach((ev,i)=>{
        const item=document.createElement('div');item.className='vseq-item';
        const tsLabel=ev.rt_ms!=null?`+${ev.rt_ms}ms`:'–';
        const valLabel=ev.block?`${ev.block} ${ev.dir}`:'cleared';
        const isCleared=!ev.block;

        let changeType='';
        if(i>0){
          const prev=v.sequence[i-1];
          if(!prev.block&&ev.block) changeType='reselect';
          else if(ev.block&&prev.block&&prev.block!==ev.block) changeType='block_change';
          else if(ev.block&&prev.block&&prev.dir!==ev.dir) changeType='dir_change';
          else if(!ev.block) changeType='cleared';
        }

        item.innerHTML=`
          ${i>0?'<span class="vseq-arrow">↳</span>':'<span class="vseq-arrow"> </span>'}
          <span class="ts">${tsLabel}</span>
          <span class="val ${isCleared?'cleared':''}">${valLabel}</span>
          ${changeType?`<span class="seq-change-type ${changeType}">${changeType.replace('_',' ')}</span>`:''}
        `;
        seq.appendChild(item);
      });
      row.appendChild(seq);
    }

    psec.appendChild(row);
  });
  panel.appendChild(psec);

  // Moves
  const msec=document.createElement('div');
  msec.innerHTML='<div class="info-title">Blocks moved</div>';
  const ml=document.createElement('div');ml.className='move-list';
  if(!round.any_move){
    ml.innerHTML='<div class="no-move-badge">No blocks moved this round</div>';
  } else {
    Object.entries(round.moves).forEach(([bid,m])=>{
      const dc=m.dc||0,dr=m.dr||0;
      const arrow=dc>0?'→':dc<0?'←':dr>0?'↓':'↑';
      const cells=Math.abs(dc||dr);
      const item=document.createElement('div');
      item.className='move-item '+(bid==='b0'?'tm':'om');
      item.textContent=`${bid.toUpperCase()}  ${arrow} ${cells} cell${cells>1?'s':''}`;
      ml.appendChild(item);
    });
  }
  msec.appendChild(ml);panel.appendChild(msec);

  // Level stats
  const statsec=document.createElement('div');
  const moved_so_far=level.rounds.slice(0,curRound+1).filter(r=>r.any_move).length;
  const wasted=(curRound+1)-moved_so_far;
  statsec.innerHTML=`<div class="info-title">Level stats</div>
    <div class="stat-row"><span>Rounds played</span><span class="stat-val">${curRound+1} / ${level.total_rounds}</span></div>
    <div class="stat-row"><span>Rounds with move</span><span class="stat-val">${moved_so_far}</span></div>
    <div class="stat-row"><span>Wasted rounds</span><span class="stat-val">${wasted}</span></div>
    <div class="stat-row"><span>Outcome</span><span class="stat-val" style="color:${level.cleared?'var(--exit)':'var(--target)'}">${level.cleared?'CLEARED':'FAILED'}</span></div>`;
  panel.appendChild(statsec);

  // Round timeline
  const tsec=document.createElement('div');
  tsec.innerHTML='<div class="info-title">Round timeline</div>';
  const dots=document.createElement('div');dots.className='round-timeline';
  level.rounds.forEach((r,ri)=>{
    const d=document.createElement('div');
    const cls=r.moves['b0']?'tm':r.any_move?'om':'nm';
    d.className=`rt-dot ${cls}${ri===curRound?' cur':''}`;
    d.title=`R${ri+1}: ${r.any_move?Object.keys(r.moves).join(', '):'no move'}`;
    d.onclick=()=>{stopPlay();curRound=ri;renderRound();};
    dots.appendChild(d);
  });
  tsec.appendChild(dots);panel.appendChild(tsec);
}

// ── Playback ──────────────────────────────────────────────────────────────────
function advance(){
  const level=DATA.sessions[curSess]?.levels[curLvl];
  if(!level)return;
  if(curRound<level.rounds.length-1){curRound++;renderRound();}
  else stopPlay();
}
function togglePlay(){
  if(playIv){stopPlay();return;}
  document.querySelector('.play-btn').textContent='⏸ PAUSE';
  playIv=setInterval(advance,500);
}
function stopPlay(){
  if(playIv){clearInterval(playIv);playIv=null;}
  const b=document.querySelector('.play-btn');if(b)b.textContent='▶ PLAY';
}
document.addEventListener('keydown',e=>{
  if(curSess===null)return;
  if(e.key==='ArrowRight'){stopPlay();advance();}
  if(e.key==='ArrowLeft'){stopPlay();curRound=Math.max(0,curRound-1);renderRound();}
  if(e.key===' '){e.preventDefault();togglePlay();}
});
</script>
